<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block titulo %}Puccetti{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/puccetti.css?v={{ estaticos_version }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <header class="cabecera">
    <a class="marca" href="/">
      <span class="marca-nombre">PUCCETTI</span>
      <span class="marca-claim">Prefactibilidad inmobiliaria</span>
    </a>

    <div class="sesion-usuario">
      <span class="sesion-nombre" title="Usuario conectado">{{ request.session.get('usuario') }}</span>
      <form method="post" action="/logout" class="sesion-logout">
        <button type="submit" class="boton-secundario">Cerrar sesión</button>
      </form>
    </div>
  </header>

  <main class="contenido">
    {% block contenido %}{% endblock %}
  </main>

  <footer class="pie">
    <span>Puccetti · {{ rol_activo.value | capitalize }}</span>
  </footer>
</body>
</html>
